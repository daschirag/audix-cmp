version: '3.8'

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: cmp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cmp
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cmp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmp-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:               development
      PORT:                   3001
      DATABASE_URL:           mongodb://mongodb:27017/cmp
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      BCRYPT_ROUNDS:          12
      FRONTEND_URL:           http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cmp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local